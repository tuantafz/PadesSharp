name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Restore
        run: dotnet restore PadesSharp.sln -p:EnableWindowsTargeting=true

      - name: Build
        run: dotnet build PadesSharp.sln --configuration Release --no-restore -p:EnableWindowsTargeting=true

      - name: Unit tests
        run: dotnet test tests/ModernPdf.Tests.Unit/ModernPdf.Tests.Unit.csproj --configuration Release --no-build --no-restore --logger "console;verbosity=normal" --collect:"XPlat Code Coverage"

      - name: Integration tests
        run: dotnet test tests/ModernPdf.Tests.Integration/ModernPdf.Tests.Integration.csproj --configuration Release --no-build --no-restore --logger "console;verbosity=normal"

      - name: Compatibility tests
        run: dotnet test tests/ModernPdf.Tests.Compatibility/ModernPdf.Tests.Compatibility.csproj --configuration Release --no-build --no-restore --logger "console;verbosity=normal"

      - name: Pack
        if: matrix.os == 'windows-latest'
        run: dotnet pack PadesSharp.sln --configuration Release --no-build --output nupkg
